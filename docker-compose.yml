services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 sinistrinha.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PROBABILITY_ENGINE_URL=http://probability_engine:8001
      - REDIS_URL=redis://redis:6379/1
      - DJANGO_SETTINGS_MODULE=sinistrinha.settings.dev
    depends_on:
      redis:
        condition: service_healthy
      probability_engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  probability_engine:
    build:
      context: .
      dockerfile: probability_engine/Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  celery:
    build: .
    command: celery -A sinistrinha worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PROBABILITY_ENGINE_URL=http://probability_engine:8001
      - REDIS_URL=redis://redis:6379/1
      - DJANGO_SETTINGS_MODULE=sinistrinha.settings.dev
    depends_on:
      redis:
        condition: service_healthy
      probability_engine:
        condition: service_healthy

  celery-beat:
    build: .
    command: celery -A sinistrinha beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/1
      - DJANGO_SETTINGS_MODULE=sinistrinha.settings.dev
    depends_on:
      redis:
        condition: service_healthy

  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci && npm run build"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/static
      - ./frontend/dist:/app/frontend
    depends_on:
      web:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully

volumes:
  redis_data:
